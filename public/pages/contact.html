<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Oni DesignStudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="../index.html" class="nav-logo">ONI DESIGNSTUDIO</a>
    <div class="nav-links">
      <a href="../index.html">Work</a>
      <div id="nav-auth">
        <a href="auth.html" class="btn-outline">Login</a>
      </div>
    </div>
  </nav>

  <!-- CONTACT -->
  <section class="auth-section">
    <div class="auth-box" style="max-width:560px">

      <div class="auth-header">
        <h2 class="auth-title">Get in Touch</h2>
        <p class="auth-sub">Interested in a project or collaboration? Send a message and we'll get back to you.</p>
      </div>

      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="c-name" placeholder="Your name"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="c-email" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="c-message" rows="6" placeholder="Enter your message..." style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.8rem 1rem;font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;resize:vertical"></textarea>
      </div>

      <p class="auth-msg" id="contact-msg"></p>
      <button class="btn-gold" style="width:100%" onclick="sendMessage()">Send Message</button>

    </div>
  </section>

  <footer class="footer">
    <div class="footer-left">
      <span class="nav-logo">ONI DESIGNSTUDIO</span>
      <p>Designing spaces that inspire.</p>
    </div>
    <div class="footer-right">
      <a href="../index.html">Work</a>
      <a href="auth.html">Visitor Login</a>
    </div>
  </footer>

  <script>
    const API = 'https://architecture-portfolio-production.up.railway.app/api';

    async function sendMessage() {
      const name = document.getElementById('c-name').value;
      const email = document.getElementById('c-email').value;
      const message = document.getElementById('c-message').value;
      const msg = document.getElementById('contact-msg');

      if (!name || !email || !message) {
        msg.textContent = 'All fields are required';
        msg.className = 'auth-msg error';
        return;
      }

      try {
        const res = await fetch(`${API}/contacts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message })
        });
        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.message;
          msg.className = 'auth-msg error';
          return;
        }

        msg.textContent = 'Message sent! We will get back to you soon.';
        msg.className = 'auth-msg success';
        document.getElementById('c-name').value = '';
        document.getElementById('c-email').value = '';
        document.getElementById('c-message').value = '';
      } catch (err) {
        msg.textContent = 'Server error';
        msg.className = 'auth-msg error';
      }
    }

    // Update nav
    const token = localStorage.getItem('visitorToken');
    const username = localStorage.getItem('visitorUsername');
    const adminToken = localStorage.getItem('adminToken');
    const navAuth = document.getElementById('nav-auth');

    if (adminToken) {
      navAuth.innerHTML = `<a href="admin.html" class="btn-outline">Dashboard</a>`;
    } else if (token) {
      navAuth.innerHTML = `
        <span style="font-size:0.8rem;color:var(--gold);margin-right:1rem">${username}</span>
        <a href="#" class="btn-outline" onclick="logout()">Logout</a>
      `;
    }

    function logout() {
      localStorage.removeItem('visitorToken');
      localStorage.removeItem('visitorUsername');
      localStorage.removeItem('adminToken');
      location.reload();
    }
  </script>

</body>
</html>
