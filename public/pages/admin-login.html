<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Oni DesignStudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>

  <section class="auth-section">
    <div class="auth-box">
      <div class="auth-header">
        <h2 class="auth-title">Admin Access</h2>
        <p class="auth-sub">This page is restricted to authorized personnel only.</p>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="admin-username" placeholder="admin"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="admin-password" placeholder="••••••••"/>
      </div>
      <p class="auth-msg" id="admin-msg"></p>
      <button class="btn-gold" style="width:100%" onclick="loginAdmin()">Login</button>
    </div>
  </section>

  <script>
    const API = window.location.hostname === 'localhost'
      ? 'http://localhost:3000/api'
      : 'https://architecture-portfolio-production.up.railway.app/api';

    // Redirect if already logged in
    if (localStorage.getItem('adminToken')) location.href = 'admin.html';

    async function loginAdmin() {
      const username = document.getElementById('admin-username').value;
      const password = document.getElementById('admin-password').value;
      const msg = document.getElementById('admin-msg');

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.message;
          msg.className = 'auth-msg error';
          return;
        }

        localStorage.setItem('adminToken', data.token);
        msg.textContent = 'Welcome back! Redirecting...';
        msg.className = 'auth-msg success';
        setTimeout(() => location.href = 'admin.html', 1000);
      } catch (err) {
        msg.textContent = 'Server error';
        msg.className = 'auth-msg error';
      }
    }
  </script>

</body>
</html>
