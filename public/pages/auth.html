<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Oni DesignStudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="../index.html" class="nav-logo">ONI DESIGNSTUDIO</a>
    <div class="nav-links">
      <a href="../index.html">Work</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <!-- AUTH CONTAINER -->
  <section class="auth-section">
    <div class="auth-box">

      <div class="auth-header">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-sub">Login or create an account to like and review projects.</p>
      </div>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••"/>
        </div>
        <p class="auth-msg" id="login-msg"></p>
        <button class="btn-gold" style="width:100%" onclick="login()">Login</button>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" style="display:none">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Your name"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="••••••••"/>
        </div>
        <p class="auth-msg" id="reg-msg"></p>
        <button class="btn-gold" style="width:100%" onclick="register()">Create Account</button>
      </div>

    </div>
  </section>

  <script src="../js/auth.js"></script>
</body>
</html>
